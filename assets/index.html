<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGI Holland - Stier Adviezen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 20px;
        }

        .header h1 {
            color: #0066CC;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .file-picker-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            display: none;
        }

        .file-picker-section.active {
            display: block;
        }

        .file-picker-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input {
            display: none;
        }

        .file-input-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0066CC 0%, #004499 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.3);
        }

        .file-input-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.4);
        }

        .file-input-button:active {
            transform: translateY(0);
        }

        .file-name {
            text-align: center;
            margin-top: 12px;
            color: #666;
            font-size: 14px;
        }

        .search-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            display: none;
        }

        .search-section.active {
            display: block;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #0066CC;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .search-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #0066CC 0%, #004499 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.3);
        }

        .search-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.4);
        }

        .change-file-button {
            width: 100%;
            padding: 8px;
            background: #f0f0f0;
            color: #666;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        .change-file-button:hover {
            background: #e0e0e0;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-header-icon {
            font-size: 32px;
        }

        .result-header-content h2 {
            color: #333;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            margin-bottom: 4px;
        }

        .result-header-content .koe-number {
            color: #0066CC;
            font-size: 28px;
            font-weight: 700;
        }

        .advice-container {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .advice-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .advice-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .advice-item:first-child {
            padding-top: 0;
        }

        .advice-indicator {
            width: 4px;
            background: #0066CC;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .advice-item:nth-child(1) .advice-indicator {
            background: #0066CC;
        }

        .advice-item:nth-child(2) .advice-indicator {
            background: #00AA66;
        }

        .advice-item:nth-child(3) .advice-indicator {
            background: #FF6600;
        }

        .advice-content {
            flex: 1;
        }

        .advice-label {
            color: #999;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .advice-text {
            color: #0066CC;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.6;
            word-break: break-word;
        }

        .advice-item:nth-child(1) .advice-text {
            color: #0066CC;
        }

        .advice-item:nth-child(2) .advice-text {
            color: #00AA66;
        }

        .advice-item:nth-child(3) .advice-text {
            color: #FF6600;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #0066CC;
            font-size: 14px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(0, 102, 204, 0.2);
            border-top: 3px solid #0066CC;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GGI Holland</h1>
            <p>Stier Adviezen Zoekmachine</p>
        </div>

        <div class="file-picker-section active" id="filePickerSection">
            <h2>📁 Selecteer een Excel of CSV bestand</h2>
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv">
                <button class="file-input-button" onclick="document.getElementById('fileInput').click()">
                    Kies bestand
                </button>
                <div class="file-name" id="fileName"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Bestand laden...</p>
        </div>

        <div class="search-section" id="searchSection">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Voer koenummer in...">
                <button class="search-button" onclick="searchKoe()">Zoeken</button>
            </div>
            <button class="change-file-button" onclick="changeFile()">Ander bestand kiezen</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="results" id="results">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-header-icon">✓</div>
                    <div class="result-header-content">
                        <h2>Gevonden:</h2>
                        <div class="koe-number" id="koeNumber"></div>
                    </div>
                </div>
                <div class="advice-container" id="adviceContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let excelData = {};

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchKoe();
        });

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            showLoading(true);
            document.getElementById('fileName').textContent = `📄 ${file.name}`;

            try {
                const content = await file.arrayBuffer();
                
                if (file.name.endsWith('.csv')) {
                    parseCSV(content);
                } else {
                    parseExcel(content);
                }

                document.getElementById('filePickerSection').classList.remove('active');
                document.getElementById('searchSection').classList.add('active');
                document.getElementById('errorMessage').classList.remove('active');
            } catch (error) {
                showError('Fout bij laden bestand: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function parseCSV(content) {
            const text = new TextDecoder().decode(content);
            const lines = text.split('\n').filter(line => line.trim());
            
            if (lines.length < 2) throw new Error('CSV bestand is leeg');

            const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
            const koeIndex = headers.findIndex(h => h.includes('koe'));
            
            if (koeIndex === -1) throw new Error('Kolom "Koe" niet gevonden');

            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(';').map(c => c.trim());
                if (!cells[koeIndex]) continue;

                const koeNum = cells[koeIndex];
                const advices = [];
                
                // Get columns after koe number
                for (let j = koeIndex + 1; j < cells.length; j++) {
                    if (cells[j]) advices.push(cells[j]);
                }

                // If data is concatenated with ;, it will be split correctly
                // If there's one long string, split it
                if (advices.length === 1 && advices[0].includes(';')) {
                    const parts = advices[0].split(';').filter(p => p.trim());
                    // Skip first part if it looks numeric (Triple aAa)
                    const startIdx = parts[0].length < 10 ? 1 : 0;
                    excelData[koeNum] = parts.slice(startIdx, startIdx + 3);
                } else {
                    excelData[koeNum] = advices.slice(0, 3);
                }
            }
        }

        function parseExcel(content) {
            // Simple XLSX parser - reads basic structure
            const zip = new Uint8Array(content);
            
            // For simplicity, we'll use a basic approach
            // In production, you might want to use a library like xlsx
            const text = new TextDecoder().decode(zip);
            
            // Extract text content from XLSX
            const matches = text.match(/<t>(.*?)<\/t>/g);
            if (!matches) throw new Error('Geen gegevens gevonden in Excel');

            const values = matches.map(m => m.replace(/<\/?t>/g, ''));
            
            // Find headers
            const koeIndex = values.findIndex(v => v.toLowerCase().includes('koe'));
            if (koeIndex === -1) throw new Error('Kolom "Koe" niet gevonden');

            // Parse rows (assuming structured data)
            const itemsPerRow = values.length / 10; // Rough estimate
            if (itemsPerRow < 2) throw new Error('Onvoldoende kolommen');

            let rowIndex = 0;
            for (let i = Math.ceil(itemsPerRow); i < values.length; i += Math.ceil(itemsPerRow)) {
                const row = values.slice(i, i + Math.ceil(itemsPerRow));
                
                if (row.length > 0 && row[0]) {
                    const koeNum = row[0];
                    const advices = row.slice(1, 4).filter(a => a && a.trim());
                    
                    if (advices.length > 0) {
                        excelData[koeNum] = advices;
                    }
                }
            }
        }

        function searchKoe() {
            const query = document.getElementById('searchInput').value.trim();
            const errorEl = document.getElementById('errorMessage');
            const resultsEl = document.getElementById('results');

            errorEl.classList.remove('active');
            resultsEl.classList.remove('active');

            if (!query) return;

            let found = null;
            let foundKey = null;

            // Exact match
            if (excelData[query]) {
                found = excelData[query];
                foundKey = query;
            } else {
                // Partial match
                for (const key in excelData) {
                    if (key.toLowerCase().includes(query.toLowerCase())) {
                        found = excelData[key];
                        foundKey = key;
                        break;
                    }
                }
            }

            if (found && found.length > 0) {
                displayResults(foundKey, found);
                resultsEl.classList.add('active');
            } else {
                errorEl.innerHTML = `<strong>❌ Koenummer "${query}" niet gevonden</strong>`;
                errorEl.classList.add('active');
            }
        }

        function displayResults(koeKey, advices) {
            document.getElementById('koeNumber').textContent = koeKey;
            
            const container = document.getElementById('adviceContainer');
            container.innerHTML = '';

            const colors = ['#0066CC', '#00AA66', '#FF6600'];
            
            advices.forEach((advice, index) => {
                const div = document.createElement('div');
                div.className = 'advice-item';
                div.innerHTML = `
                    <div class="advice-indicator"></div>
                    <div class="advice-content">
                        <span class="advice-label">Stier ${index + 1}</span>
                        <div class="advice-text">${escapeHtml(advice)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function changeFile() {
            excelData = {};
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('filePickerSection').classList.add('active');
            document.getElementById('searchSection').classList.remove('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.innerHTML = `<strong>❌ ${message}</strong>`;
            errorEl.classList.add('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
